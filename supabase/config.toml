# User-facing functions — JWT verified inside function code (not infra gate)
# Supabase infra JWT verification was blocking valid tokens, so we verify
# manually inside each function using the Authorization header.
[functions.generate-video]
verify_jwt = false

[functions.generate-script]
verify_jwt = false

[functions.video-status]
verify_jwt = false

[functions.scrape-property]
verify_jwt = false

# Room detection is a stateless utility (no user data) — skip JWT
[functions.detect-room-types]
verify_jwt = false

# Internal functions called by other edge functions (not browser-facing)
[functions.smart-crop-portrait]
verify_jwt = false

[functions.crop-image]
verify_jwt = false

[functions.generate-runway-batch]
verify_jwt = false

[functions.check-runway-batch]
verify_jwt = false

[functions.generate-luma-batch]
verify_jwt = false

[functions.check-luma-batch]
verify_jwt = false

[functions.stitch-video]
verify_jwt = false

# Stripe webhook uses its own signature verification, not JWT
[functions.stripe-webhook]
verify_jwt = false
